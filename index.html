<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finanzplan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

input,select{
padding:10px;
margin:5px 0;
width:100%;
box-sizing:border-box;
}

button{
padding:10px;
margin:5px 0;
cursor:pointer;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

/* Menü Button */

#menuButton{
position:fixed;
top:15px;
left:15px;
font-size:28px;
cursor:pointer;
z-index:1001;
}

/* Seiten Menü */

#sideMenu{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:#2c3e50;
color:white;
padding:20px;
transition:left 0.3s ease;
z-index:1000;
}

#sideMenu a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:18px;
}

#sideMenu a:hover{
opacity:0.7;
}

/* Handy Layout */

@media (max-width:700px){

.container{
padding:15px;
}

}

</style>

</head>

<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>

<div id="sideMenu">

<h3>Menü</h3>

<a href="#">Dashboard</a>
<a href="#">Einnahmen</a>
<a href="#">Ausgaben</a>
<a href="#">Analyse</a>

</div>

<div class="container">

<h1>Finanzplan</h1>

<h2>Monat auswählen</h2>

<select id="monthSelect">

<option>Januar</option>
<option>Februar</option>
<option>März</option>
<option>April</option>
<option>Mai</option>
<option>Juni</option>
<option>Juli</option>
<option>August</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Dezember</option>

</select>

<h2>Einnahmen</h2>

<input id="incomeName" placeholder="Quelle">

<input id="incomeAmount" type="number" step="0.01" placeholder="Betrag">

<button onclick="addIncome()">Hinzufügen</button>

<table>

<thead>
<tr>
<th>Quelle</th>
<th>Betrag</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="incomeTable"></tbody>

</table>

<h2>Ausgaben</h2>

<input id="expenseName" placeholder="Kategorie">

<input id="expenseAmount" type="number" step="0.01" placeholder="Betrag">

<button onclick="addExpense()">Hinzufügen</button>

<table>

<thead>
<tr>
<th>Kategorie</th>
<th>Betrag</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="expenseTable"></tbody>

</table>

<h2>Diagramm</h2>

<select id="chartType" onchange="render()">
<option value="pie">Kreisdiagramm</option>
<option value="bar">Balkendiagramm</option>
</select>

<canvas id="chart"></canvas>

<h2>Bilanz</h2>

<p id="totalIncome">Einnahmen: 0 €</p>
<p id="totalExpense">Ausgaben: 0 €</p>
<p id="balance">Übrig: 0 €</p>

</div>

<script>

let incomes=[]
let expenses=[]
let chart

function toggleMenu(){

let menu=document.getElementById("sideMenu")

if(menu.style.left==="0px"){
menu.style.left="-260px"
}else{
menu.style.left="0px"
}

}

function addIncome(){

let name=document.getElementById("incomeName").value
let amount=parseFloat(document.getElementById("incomeAmount").value)

if(!name || isNaN(amount)) return

incomes.push({name,amount})

saveData()
render()

}

function addExpense(){

let name=document.getElementById("expenseName").value
let amount=parseFloat(document.getElementById("expenseAmount").value)

if(!name || isNaN(amount)) return

expenses.push({name,amount})

saveData()
render()

}

function deleteIncome(i){

incomes.splice(i,1)

saveData()
render()

}

function deleteExpense(i){

expenses.splice(i,1)

saveData()
render()

}

function editIncome(i){

let newName=prompt("Neue Einnahme:",incomes[i].name)
let newAmount=prompt("Neuer Betrag:",incomes[i].amount)

if(newName && newAmount){

incomes[i].name=newName
incomes[i].amount=parseFloat(newAmount)

}

saveData()
render()

}

function editExpense(i){

let newName=prompt("Neue Kategorie:",expenses[i].name)
let newAmount=prompt("Neuer Betrag:",expenses[i].amount)

if(newName && newAmount){

expenses[i].name=newName
expenses[i].amount=parseFloat(newAmount)

}

saveData()
render()

}

function render(){

let incomeTable=document.getElementById("incomeTable")
let expenseTable=document.getElementById("expenseTable")

incomeTable.innerHTML=""
expenseTable.innerHTML=""

let totalIncome=0
let totalExpense=0

incomes.forEach((i,index)=>{

totalIncome+=i.amount

incomeTable.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.amount.toFixed(2)} €</td>
<td>
<button onclick="editIncome(${index})">✏️</button>
<button onclick="deleteIncome(${index})">❌</button>
</td>
</tr>
`

})

expenses.forEach((e,index)=>{

totalExpense+=e.amount

expenseTable.innerHTML+=`
<tr>
<td>${e.name}</td>
<td>${e.amount.toFixed(2)} €</td>
<td>
<button onclick="editExpense(${index})">✏️</button>
<button onclick="deleteExpense(${index})">❌</button>
</td>
</tr>
`

})

document.getElementById("totalIncome").innerText="Einnahmen: "+totalIncome.toFixed(2)+" €"
document.getElementById("totalExpense").innerText="Ausgaben: "+totalExpense.toFixed(2)+" €"
document.getElementById("balance").innerText="Übrig: "+(totalIncome-totalExpense).toFixed(2)+" €"

updateChart(totalIncome,totalExpense)

}

function updateChart(income,expense){

let type=document.getElementById("chartType").value

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:type,

data:{
labels:["Einnahmen","Ausgaben"],
datasets:[{
data:[income,expense]
}]
}

})

}

function saveData(){

localStorage.setItem("incomes",JSON.stringify(incomes))
localStorage.setItem("expenses",JSON.stringify(expenses))

}

function loadData(){

let savedIncomes=localStorage.getItem("incomes")
let savedExpenses=localStorage.getItem("expenses")

if(savedIncomes){
incomes=JSON.parse(savedIncomes)
}

if(savedExpenses){
expenses=JSON.parse(savedExpenses)
}

render()

}

loadData()

</script>

</body>
</html>
