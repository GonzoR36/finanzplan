<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device=width, initial-scale=1.0">
<title>Beta Finanzplan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<Style>
body{
front-family:Arial;
margin:0;
background:#f4f4f4;
h1{
text-align:center;
}

.container{
padding:20px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

#menubutton{
position:fixed;
top:15px;
left:15px;
front-size:28px;
cursor:pointer;
z-index:1000;
}

#sidemenu{
position:fixed;
left:-220px;
top:0;
widht:220px;
height:100%;
background:#2c3e50;
color:white;
padding:20px;
transition:0.3s;
}
#sidemenu a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

@media (max-widht:700px){
input{
widht:100%;
}

}

</style>
</head>
<body>
<div id="menuButton" onclick="toggleMenu()"=</div>
<div id="sideMenu">
<h3>Menü</h3>

</div>
<div class="container">

<h1>Finanzplan</h1>

<h2>Monat auswählen</h2>

<select id="monthSelect">
<option>Januar</option>
<option>Februar</option>
<option>März</option>
<option>April</option>
<option>Mai</option>
<option>Juni</option>
<option>Juli</option>
<option>August</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Dezember</option>
</select>

<h2>Einnahmen</h2>
<input id="incomeName" placeholder="Quelle (z.B Gehalt)">
<input id="incomeAmount" type="number" step="0.01" placeholder="Betrag">
<button onclick="addIncome()">Hinzufügen</button>
<table id="incomeTable">

  <button onclick="editExpense(${i})">Bearbeiten</button>
   <button onclick="deleteExpense(${i})">X</button>
  </td>
  </tr>`;
 });

<tr>
<th>Quelle</th>
<th>Betrag</th>
</tr>
</table>
<h2>Ausgaben</h2>

<input id="expenseName" placeholder="Kategorie">
<input id="expenseAmount" type="number" step="0.01" placeholder="Betrag">
<table id="expenseTable">
<tr>
<th>Kategorie</th>
<th>Betrag</th>
</tr>
</table>

<h2>Diagramm</h2>

<h2>Bilanz</h2>

<p id="totalIncome">Einnahmen: 0 €</p>
<p id="totalExpense">Ausgaben: 0 €</p>
<p id="balance">Übrig: 0 €</p>
  
<select id="chartType" onchange="updateChart()">

<option value="pie"><Kreisdiagramm</option>
<option value="bar"Balkendiagramm</option>

</select>
</div>

<script>

function saveData(){

localStorage.setItem("incomes",JSON.stringify(incomes))
localStorage.setItem("expenses",JSON.stringify(expenses))

}

function loadData(){

let savedIncomes=localStorage.getItem("incomes")
let savedExpenses=localStorage.getItem("expenses")

if(savedIncomes){
incomes=JSON.parse(savedIncomes)
}

if(savedExpenses){
expenses=JSON.parse(savedExpenses)
}

}

let incomes=[]
let expenses=[]
let chart

function toggleMenu(){

let menu=document.getElementById("sideMenu")

if(menu.style.left==="0px"){
menu.style.left="-220px"
}else{
menu.style.left="0px"
}

}

function addIncome(){

let name=document.getElementById("incomeName").value
let amount=parseFloat(document.getElementById("incomeAmount").value)

if(!name || !amount) return

incomes.push({name,amount})

let table=document.getElementById("incomeTable")

let row=table.insertRow()

row.insertCell(0).innerText=name
row.insertCell(1).innerText=amount+" €"

let incomeTotal=0
let expenseTotal=0

incomes.forEach(i=>{
incomeTotal+=i.amount
})

expenses.forEach(e=>{
expenseTotal+=e.amount
})

let type=document.getElementById("chartType").value

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:type,

data:{
labels:["Einnahmen","Ausgaben"],
datasets:[{
data:[incomeTotal,expenseTotal]
}]
}

})

}

function addExpense(){

let name=document.getElementById("expenseName").value
let amount=parseFloat(document.getElementById("expenseAmount").value)

if(!name || !amount) return

expenses.push({name,amount})

let table=document.getElementById("expenseTable")

let row=table.insertRow()

row.insertCell(0).innerText=name
row.insertCell(1).innerText=amount+" €"

updateChart()

}

function updateChart(){

let labels=expenses.map(e=>e.name)
let data=expenses.map(e=>e.amount)

let type=document.getElementById("chartType").value

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:type,

data:{
labels:labels,
datasets:[{
label:"Ausgaben",
data:data
}]
}

})

}

</script>

</html>
