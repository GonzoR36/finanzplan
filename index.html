<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mein Finanzplan V6</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9;}
.container { background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2 { color:#2c3e50;}
input, select { padding:6px; margin:5px;}
button { padding:6px 12px; margin:3px; cursor:pointer;}
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:8px;}
th { background:#2c3e50; color:white;}
.summary { font-weight:bold; margin-top:10px;}
.warning { color:red; font-weight:bold; }
canvas { margin-top:20px;}
</style>
</head>
<body>

<div class="container">
<h2>Mein Finanzplan V6</h2>

<label>Monat:</label>
<select id="monthSelect" onchange="loadMonth()">
<option>Januar</option><option>Februar</option><option>März</option>
<option>April</option><option>Mai</option><option>Juni</option>
<option>Juli</option><option>August</option><option>September</option>
<option>Oktober</option><option>November</option><option>Dezember</option>
</select>

<h3>Einnahmen hinzufügen</h3>

<input type="text" id="incomeSource" placeholder="z.B. Gehalt, Kindergeld">
<input type="number" step="0.01" id="incomeAmount" placeholder="Betrag €">
<button onclick="addIncome()">Einnahme hinzufügen</button>

<table>
<thead>
<tr>
<th>Einnahme</th>
<th>Betrag (€)</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="incomeTable"></tbody>
</table>

<div id="incomeTotal">Gesamteinnahmen: 0 €</div>

<h3>Budget-Limit (optional)</h3>
<input type="number" step="0.01" id="budgetLimit" placeholder="z.B. 1500" oninput="updateAll()">

<h3>Ausgabe hinzufügen</h3>
<input type="text" id="category" placeholder="Kategorie">
<input type="text" id="amount" placeholder="Betrag z.B. 12,99">
<label><input type="checkbox" id="fixedCost"> Fixkosten</label>
<button onclick="saveExpense()">Speichern</button>

<table>
<thead>
<tr><th>Kategorie</th><th>Betrag (€)</th><th>Fix</th><th>%</th><th>Aktion</th></tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

<div class="summary" id="summary"></div>
<div class="warning" id="warning"></div>

<h3>Ausgaben-Verteilung</h3>
<canvas id="expenseChart"></canvas>

<h3>Jahresverlauf</h3>
<canvas id="yearChart"></canvas>

</div>

<script>
let chart1, chart2;
let currentMonth = document.getElementById("monthSelect").value;
let editIndex = null;

function parseAmount(v){ return parseFloat(v.replace(",", ".")); }

function getMonthData(month){
 return JSON.parse(localStorage.getItem(month)) || {income:0, limit:0, expenses:[]};
}

function saveMonthData(month,data){
 localStorage.setItem(month,JSON.stringify(data));
}

function loadMonth(){
 currentMonth=document.getElementById("monthSelect").value;
 editIndex=null;
 updateAll();
}

function saveExpense(){
 let data=getMonthData(currentMonth);
 const cat=document.getElementById("category").value;
 const amt=parseAmount(document.getElementById("amount").value);
 const fixed=document.getElementById("fixedCost").checked;
 if(!cat||isNaN(amt)) return;

 if(editIndex!==null){
  data.expenses[editIndex]={category:cat,amount:amt,fixed:fixed};
  editIndex=null;
 } else {
  data.expenses.push({category:cat,amount:amt,fixed:fixed});
 }

 saveMonthData(currentMonth,data);
 document.getElementById("category").value="";
 document.getElementById("amount").value="";
 document.getElementById("fixedCost").checked=false;
 updateAll();
}

function editExpense(i){
 let data=getMonthData(currentMonth);
 let e=data.expenses[i];
 document.getElementById("category").value=e.category;
 document.getElementById("amount").value=e.amount;
 document.getElementById("fixedCost").checked=e.fixed;
 editIndex=i;
}

function deleteExpense(i){
 let data=getMonthData(currentMonth);
 data.expenses.splice(i,1);
 saveMonthData(currentMonth,data);
 updateAll();
}

function updateAll(){
 let data=getMonthData(currentMonth);
 data.income=parseAmount(document.getElementById("income").value)||data.income;
 data.limit=parseAmount(document.getElementById("budgetLimit").value)||data.limit;
 saveMonthData(currentMonth,data);

 document.getElementById("income").value=data.income;
 document.getElementById("budgetLimit").value=data.limit;

 const total=data.expenses.reduce((s,e)=>s+e.amount,0);
 const fixedTotal=data.expenses.filter(e=>e.fixed).reduce((s,e)=>s+e.amount,0);
 const free=data.income-total;

 const table=document.getElementById("expenseTable");
 table.innerHTML="";
 data.expenses.forEach((e,i)=>{
  table.innerHTML+=`
  <tr>
  <td>${e.category}</td>
  <td>${e.amount.toFixed(2)}</td>
  <td>${e.fixed?"Ja":"Nein"}</td>
  <td>${total>0?((e.amount/total)*100).toFixed(1):0}%</td>
  <td>
   <button onclick="editExpense(${i})">Bearbeiten</button>
   <button onclick="deleteExpense(${i})">X</button>
  </td>
  </tr>`;
 });

 document.getElementById("summary").innerText=
 "Ausgaben: "+total.toFixed(2)+" € | Fixkosten: "+fixedTotal.toFixed(2)+" € | Frei: "+free.toFixed(2)+" €";

 if(data.limit>0 && total>data.limit){
  document.getElementById("warning").innerText="⚠ Budget überschritten!";
 } else {
  document.getElementById("warning").innerText="";
 }

 updateCharts();
 updateYearChart();
}

function updateCharts(){
 let data=getMonthData(currentMonth);
 const total=data.expenses.reduce((s,e)=>s+e.amount,0);

 if(chart1)chart1.destroy();

 chart1=new Chart(document.getElementById("expenseChart"),{
  type:'pie',
  data:{labels:data.expenses.map(e=>e.category),
  datasets:[{data:data.expenses.map(e=>e.amount)}]}
 });
}

function updateYearChart(){
 if(chart2)chart2.destroy();
 const months=["Januar","Februar","März","April","Mai","Juni",
 "Juli","August","September","Oktober","November","Dezember"];
 const values=months.map(m=>{
  let d=getMonthData(m);
  return d.expenses.reduce((s,e)=>s+e.amount,0);
 });

 chart2=new Chart(document.getElementById("yearChart"),{
  type:'line',
  data:{labels:months,datasets:[{label:"Ausgaben",data:values}]}
 });
}

updateAll();
</script>

</body>
</html>
